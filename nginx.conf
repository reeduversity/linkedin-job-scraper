server {
    listen 80;
    server_name _;   # Replace _ with your EC2 public IP or domain

    # Allow large request bodies (for potential file uploads)
    client_max_body_size 20M;

    # Proxy all /api/* and /docs /redoc /openapi.json to FastAPI
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support (for future use)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Timeouts — scraping jobs can take time
        proxy_read_timeout    120s;
        proxy_connect_timeout 120s;
        proxy_send_timeout    120s;
    }

    # Health check endpoint (used by AWS load balancers etc.)
    location /health {
        proxy_pass http://127.0.0.1:8000/api/health;
        proxy_set_header Host $host;
        access_log off;
    }
}
